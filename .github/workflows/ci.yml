name: Playwright BDD CI

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      ALLURE_REPORT_URL: https://deepak1512.github.io/Playwright-bdd-Framework/
      GITHUB_RUN_ID: ${{ github.run_id }}
      GITHUB_REPOSITORY: ${{ github.repository }}
      CI: true

    steps:
      # -------------------------
      # ✅ Checkout Code
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # ✅ Setup Node
      # -------------------------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------
      # ✅ Install Dependencies
      # -------------------------
      - name: Install Dependencies
        run: npm ci

      # -------------------------
      # ✅ Install Playwright Browsers
      # -------------------------
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      # -------------------------
      # ✅ Run Cucumber Tests
      # -------------------------
      - name: Run Tests
        run: npm test

      # -------------------------
      # ✅ Generate Allure Summary JSON
      # -------------------------
      - name: Generate Allure Summary
        if: always()
        run: node generate-summary.js

      # -------------------------
      # ✅ Send Summary To Dashboard Backend
      # -------------------------
      - name: Send Summary To Dashboard
        if: always()
        run: |
          curl -X POST https://qa-analytics-backend.onrender.com/api/allure-update \
          -H "Content-Type: application/json" \
          -d @summary.json

      # -------------------------
      # ✅ Upload Screenshots Artifact
      # -------------------------
      - name: Upload Screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-screenshots
          path: screenshots/
          if-no-files-found: ignore

      # -------------------------
      # ✅ Upload Videos Artifact
      # -------------------------
      - name: Upload Videos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos
          path: videos/
          if-no-files-found: ignore

      # -------------------------
      # ✅ Generate Allure Report + Copy Videos
      # -------------------------
      - name: Generate Allure Report
        if: always()
        run: |
          npx allure generate ./allure-results --clean -o ./allure-report

          mkdir -p allure-report/videos

          if [ -d "videos" ]; then
            cp -r videos/* allure-report/videos/
          fi

      # -------------------------
      # ✅ Upload Allure Report to GitHub Pages
      # -------------------------
      - name: Upload Pages Artifact
        if: ${{ success() }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      # -------------------------
      # ✅ Deploy Allure + Videos to GitHub Pages
      # -------------------------
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
